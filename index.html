<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>记账管理系统</title>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#2563eb;--primary-light:#dbeafe;--primary-dark:#1d4ed8;
  --green:#16a34a;--green-bg:#dcfce7;
  --red:#dc2626;--red-bg:#fee2e2;
  --amber:#d97706;--amber-bg:#fef3c7;
  --cyan:#0891b2;--cyan-bg:#cffafe;
  --purple:#7c3aed;--purple-bg:#ede9fe;
  --orange:#ea580c;--orange-bg:#fff7ed;
  --gray-50:#f9fafb;--gray-100:#f3f4f6;--gray-200:#e5e7eb;--gray-300:#d1d5db;
  --gray-500:#6b7280;--gray-700:#374151;--gray-900:#111827;
  --sidebar-bg:#1e293b;--sidebar-text:#94a3b8;
  --radius:8px;--shadow:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);
  --shadow-lg:0 4px 12px rgba(0,0,0,.1);
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:var(--gray-100);color:var(--gray-900);line-height:1.6}
.app{display:flex;min-height:100vh}

/* Sidebar */
.sidebar{width:220px;background:var(--sidebar-bg);color:var(--sidebar-text);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:10}
.sidebar-logo{padding:20px;font-size:18px;font-weight:700;color:#fff;border-bottom:1px solid rgba(255,255,255,.1);text-align:center;letter-spacing:2px}
.month-nav{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:4px}
.month-nav button{background:rgba(255,255,255,.1);border:none;color:#fff;width:28px;height:28px;border-radius:4px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.month-nav button:hover{background:rgba(255,255,255,.2)}
.month-nav input[type=month]{flex:1;background:transparent;border:1px solid rgba(255,255,255,.2);color:#fff;padding:4px 6px;border-radius:4px;font-size:13px;text-align:center}
.month-nav input[type=month]::-webkit-calendar-picker-indicator{filter:invert(1);cursor:pointer}
.nav-links{flex:1;padding:8px 0}
.nav-links a{display:flex;align-items:center;padding:10px 20px;color:var(--sidebar-text);text-decoration:none;cursor:pointer;transition:all .2s;font-size:14px;border-left:3px solid transparent}
.nav-links a:hover{background:rgba(255,255,255,.05);color:#fff}
.nav-links a.active{background:rgba(37,99,235,.2);color:#fff;border-left-color:var(--primary)}
.nav-links a .icon{width:20px;margin-right:10px;text-align:center;font-size:15px}
.sidebar-footer{padding:12px 16px;border-top:1px solid rgba(255,255,255,.1);display:flex;flex-direction:column;gap:6px}
.sidebar-footer button{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:var(--sidebar-text);padding:6px 12px;border-radius:4px;cursor:pointer;font-size:12px;transition:all .2s}
.sidebar-footer button:hover{background:rgba(255,255,255,.15);color:#fff}

/* Main */
.main{flex:1;margin-left:220px;padding:24px 32px}
.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.page-header h2{font-size:20px;font-weight:600}

/* Cards */
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:28px}
.card{background:#fff;border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);border-left:4px solid var(--gray-300)}
.card .label{font-size:13px;color:var(--gray-500);margin-bottom:6px}
.card .value{font-size:24px;font-weight:700}
.card.c-revenue{border-left-color:var(--green)}.card.c-revenue .value{color:var(--green)}
.card.c-cost{border-left-color:var(--red)}.card.c-cost .value{color:var(--red)}
.card.c-gross{border-left-color:var(--primary)}.card.c-gross .value{color:var(--primary)}
.card.c-cashflow{border-left-color:var(--cyan)}.card.c-cashflow .value{color:var(--cyan)}
.card.c-salary{border-left-color:var(--amber)}.card.c-salary .value{color:var(--amber)}
.card.c-boss{border-left-color:var(--purple)}.card.c-boss .value{color:var(--purple)}

/* Pie chart */
.chart-row{display:flex;gap:24px;margin-bottom:28px}
.pie-wrap{background:#fff;border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);flex:1;display:flex;flex-direction:column;align-items:center}
.pie-wrap h3{font-size:16px;margin-bottom:16px;align-self:flex-start}
.pie-box{position:relative;width:200px;height:200px}
.pie-svg{width:200px;height:200px;transform:rotate(-90deg)}
.pie-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.pie-center .big{font-size:20px;font-weight:700;color:var(--gray-900)}
.pie-center .small{font-size:12px;color:var(--gray-500)}
.pie-legend{margin-top:16px;display:flex;flex-wrap:wrap;gap:8px 16px;font-size:13px}
.pie-legend .dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:4px;vertical-align:middle}

/* Waterfall */
.waterfall{background:#fff;border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);flex:1}
.waterfall h3{font-size:16px;margin-bottom:16px;color:var(--gray-700)}
.wf-row{display:flex;align-items:center;margin-bottom:10px;font-size:14px}
.wf-label{width:140px;color:var(--gray-700);font-weight:500}
.wf-bar-wrap{flex:1;height:28px;background:var(--gray-100);border-radius:4px;overflow:hidden;margin:0 12px;position:relative}
.wf-bar{height:100%;border-radius:4px;transition:width .5s ease;min-width:2px}
.wf-amount{width:120px;text-align:right;font-weight:600;font-variant-numeric:tabular-nums}
.wf-row.positive .wf-bar{background:var(--green)}.wf-row.positive .wf-amount{color:var(--green)}
.wf-row.negative .wf-bar{background:var(--red)}.wf-row.negative .wf-amount{color:var(--red)}
.wf-row.result .wf-bar{background:var(--primary)}.wf-row.result .wf-amount{color:var(--primary)}
.wf-row.person .wf-bar{background:var(--amber)}.wf-row.person .wf-amount{color:var(--amber)}
.wf-row.reserve .wf-bar{background:var(--cyan)}.wf-row.reserve .wf-amount{color:var(--cyan)}
.wf-row.boss .wf-bar{background:var(--purple)}.wf-row.boss .wf-amount{color:var(--purple)}
.wf-divider{border-top:1px dashed var(--gray-300);margin:8px 0}

/* Table */
.section-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:24px}
table{width:100%;border-collapse:collapse}
thead{background:var(--gray-50)}
th{padding:10px 16px;text-align:left;font-size:13px;font-weight:600;color:var(--gray-500);text-transform:uppercase;border-bottom:2px solid var(--gray-200)}
td{padding:10px 16px;border-bottom:1px solid var(--gray-100);font-size:14px}
tbody tr:hover{background:var(--gray-50)}
tfoot td{border-top:2px solid var(--gray-200);font-weight:600;background:var(--gray-50)}
.text-right{text-align:right}
.text-green{color:var(--green)}
.text-red{color:var(--red)}
.text-muted{color:var(--gray-500)}
.empty-msg{padding:40px;text-align:center;color:var(--gray-500);font-size:14px}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:4px;padding:7px 14px;border:none;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-dark)}
.btn-danger{background:var(--red);color:#fff}.btn-danger:hover{opacity:.9}
.btn-ghost{background:transparent;color:var(--gray-500);border:1px solid var(--gray-300)}.btn-ghost:hover{background:var(--gray-100);color:var(--gray-700)}
.btn-sm{padding:4px 10px;font-size:12px}

/* Form */
.form-row{display:flex;gap:12px;margin-bottom:14px;align-items:flex-end}
.form-group{display:flex;flex-direction:column;flex:1}
.form-group label{font-size:12px;color:var(--gray-500);margin-bottom:4px;font-weight:500}
.form-group input,.form-group select{padding:8px 10px;border:1px solid var(--gray-300);border-radius:6px;font-size:14px;outline:none;transition:border .2s}
.form-group input:focus,.form-group select:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-light)}

/* Distribution page */
.dist-section{background:#fff;border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);margin-bottom:24px}
.dist-section h3{margin-bottom:16px;font-size:16px;font-weight:600;color:var(--gray-700)}
.dist-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px}
.dist-card{border:1px solid var(--gray-200);border-radius:var(--radius);padding:16px;text-align:center;transition:box-shadow .2s}
.dist-card:hover{box-shadow:var(--shadow)}
.dist-card .dc-label{font-size:13px;color:var(--gray-500);margin-bottom:4px}
.dist-card .dc-pct{font-size:28px;font-weight:700;margin-bottom:2px}
.dist-card .dc-amount{font-size:15px;font-weight:600}
.dist-card.dc-cashflow{border-color:var(--cyan)}.dist-card.dc-cashflow .dc-pct{color:var(--cyan)}.dist-card.dc-cashflow .dc-amount{color:var(--cyan)}
.dist-card.dc-salary{border-color:var(--amber)}.dist-card.dc-salary .dc-pct{color:var(--amber)}.dist-card.dc-salary .dc-amount{color:var(--amber)}
.dist-card.dc-pool{border-color:var(--purple)}.dist-card.dc-pool .dc-pct{color:var(--purple)}.dist-card.dc-pool .dc-amount{color:var(--purple)}

/* Profit breakdown rows */
.pb-table{width:100%}
.pb-table td{padding:12px 16px;font-size:15px}
.pb-table .pb-name{font-weight:500}
.pb-table .pb-pct{color:var(--gray-500);width:80px}
.pb-table .pb-amt{text-align:right;font-weight:700;font-variant-numeric:tabular-nums;width:140px}
.pb-table .pb-note{color:var(--gray-500);font-size:13px;width:120px}
.pb-table tr.cat-header td{background:var(--gray-50);font-weight:600;font-size:14px;color:var(--gray-700);padding:8px 16px}
.pb-table tr.sub-total td{border-top:2px solid var(--gray-200);font-weight:700;background:var(--gray-50)}
.pb-table tr.highlight-cyan td{background:var(--cyan-bg)}
.pb-table tr.highlight-amber td{background:var(--amber-bg)}
.pb-table tr.highlight-purple td{background:var(--purple-bg)}
.pb-table tr.highlight-green td{background:var(--green-bg)}
.pb-table tr.highlight-red td{background:var(--red-bg)}

/* Ratio sliders */
.ratio-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.ratio-row label{width:100px;font-size:14px;font-weight:500;color:var(--gray-700)}
.ratio-row input[type=range]{flex:1;accent-color:var(--primary)}
.ratio-row .ratio-val{min-width:50px;text-align:center;font-size:18px;font-weight:700}
.ratio-row.rc .ratio-val{color:var(--cyan)}
.ratio-row.rb .ratio-val{color:var(--purple)}
.ratio-row.rs .ratio-val{color:var(--amber)}
.ratio-warn{color:var(--red);font-size:13px;margin-bottom:8px}

/* Bonus edit */
.bonus-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.bonus-row input{padding:6px 8px;border:1px solid var(--gray-300);border-radius:4px;font-size:14px;outline:none}
.bonus-row input:focus{border-color:var(--primary)}
.bonus-row .bn{flex:1}.bonus-row .ba{width:100px}.bonus-row .bm{flex:1}

/* Modal */
.modal-mask{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:#fff;border-radius:12px;width:460px;max-width:92vw;box-shadow:var(--shadow-lg)}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--gray-200)}
.modal-head h3{font-size:16px;font-weight:600}
.modal-head button{background:none;border:none;font-size:22px;cursor:pointer;color:var(--gray-500);line-height:1}
.modal-body{padding:20px}
.modal-foot{display:flex;justify-content:flex-end;gap:8px;padding:12px 20px;border-top:1px solid var(--gray-200)}
.confirm-text{font-size:15px;color:var(--gray-700);margin-bottom:8px}

/* Print */
@media print{
  .sidebar,.btn,.month-nav,.sidebar-footer,.modal-mask{display:none!important}
  .main{margin-left:0!important;padding:10px!important}
  .card,.section-card,.waterfall,.dist-section,.pie-wrap{box-shadow:none!important;break-inside:avoid}
}
@media(max-width:768px){
  .sidebar{width:60px}.sidebar-logo span,.nav-links a span,.sidebar-footer span{display:none}
  .nav-links a .icon{margin:0}
  .main{margin-left:60px;padding:16px}
  .cards{grid-template-columns:1fr 1fr}
  .dist-grid{grid-template-columns:1fr}
  .chart-row{flex-direction:column}
  .form-row{flex-direction:column}
}
/* Token gate */
.gate-mask{position:fixed;inset:0;background:linear-gradient(135deg,#1e293b 0%,#0f172a 100%);display:flex;align-items:center;justify-content:center;z-index:999}
.gate-box{background:#fff;border-radius:16px;padding:40px 36px;box-shadow:0 8px 32px rgba(0,0,0,.25);width:360px;max-width:90vw;text-align:center}
.gate-box h2{font-size:20px;margin-bottom:6px;color:var(--gray-900)}
.gate-box p{font-size:13px;color:var(--gray-500);margin-bottom:24px}
.gate-input{width:100%;padding:12px 14px;border:2px solid var(--gray-200);border-radius:8px;font-size:15px;outline:none;transition:border .2s;text-align:center;letter-spacing:2px}
.gate-input:focus{border-color:var(--primary)}
.gate-input.shake{animation:shake .4s ease}
.gate-btn{width:100%;padding:12px;margin-top:14px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:background .2s}
.gate-btn:hover{background:var(--primary-dark)}
.gate-err{color:var(--red);font-size:13px;margin-top:10px;min-height:18px}
.gate-remember{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:12px;font-size:13px;color:var(--gray-500)}
.gate-remember input{accent-color:var(--primary)}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
</style>
</head>
<body>
<!-- Token Gate -->
<div id="gate" class="gate-mask">
  <div class="gate-box">
    <h2>记账管理系统</h2>
    <p>请输入访问密码</p>
    <input id="gate-pwd" class="gate-input" type="password" placeholder="输入密码后回车" autofocus>
    <button class="gate-btn" onclick="checkToken()">进 入</button>
    <div id="gate-err" class="gate-err"></div>
    <label class="gate-remember"><input type="checkbox" id="gate-remember" checked>记住密码（本浏览器）</label>
  </div>
</div>
<script>
const TOKEN_HASH='62ae7f9ec6f707cc7a5ddd949fa9e48f75b7e4d17ff6e96e3d853477b850bbf6';
const TOKEN_STORE_KEY='accounting_token';
async function sha256(s){const e=new TextEncoder().encode(s);const h=await crypto.subtle.digest('SHA-256',e);return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,'0')).join('');}
async function checkToken(){
  const inp=document.getElementById('gate-pwd');
  const hash=await sha256(inp.value.trim());
  if(hash===TOKEN_HASH){
    if(document.getElementById('gate-remember').checked)localStorage.setItem(TOKEN_STORE_KEY,hash);
    document.getElementById('gate').style.display='none';
    document.getElementById('app').style.display='';
  }else{
    document.getElementById('gate-err').textContent='密码错误，请重试';
    inp.classList.add('shake');setTimeout(()=>inp.classList.remove('shake'),400);
    inp.value='';inp.focus();
  }
}
document.getElementById('gate-pwd').addEventListener('keydown',e=>{if(e.key==='Enter')checkToken();});
(async function(){const saved=localStorage.getItem(TOKEN_STORE_KEY);if(saved===TOKEN_HASH){document.getElementById('gate').style.display='none';document.getElementById('app').style.display='';}else{document.getElementById('app').style.display='none';}})();
</script>

<div id="app" class="app" style="display:none">
  <aside class="sidebar">
    <div class="sidebar-logo">记账管理系统</div>
    <div class="month-nav">
      <button @click="changeMonth(-1)" title="上个月">&lsaquo;</button>
      <input type="month" v-model="currentMonth">
      <button @click="changeMonth(1)" title="下个月">&rsaquo;</button>
    </div>
    <nav class="nav-links">
      <a :class="{active:tab==='dashboard'}" @click="tab='dashboard'"><span class="icon">&#9632;</span><span>总 览</span></a>
      <a :class="{active:tab==='revenue'}" @click="tab='revenue'"><span class="icon">&#9650;</span><span>收 入</span></a>
      <a :class="{active:tab==='cost'}" @click="tab='cost'"><span class="icon">&#9660;</span><span>成 本</span></a>
      <a :class="{active:tab==='dist'}" @click="tab='dist'"><span class="icon">&#9733;</span><span>利润分配</span></a>
    </nav>
    <div class="sidebar-footer">
      <button @click="printPage"><span>打印月报</span></button>
      <button @click="exportJSON"><span>导出数据</span></button>
      <button @click="$refs.importFile.click()"><span>导入数据</span></button>
      <input type="file" ref="importFile" accept=".json" @change="importJSON" style="display:none">
    </div>
  </aside>

  <main class="main">

    <!-- ===== Dashboard ===== -->
    <template v-if="tab==='dashboard'">
      <div class="page-header"><h2>{{ monthLabel }} - 总览</h2></div>
      <div class="cards">
        <div class="card c-revenue"><div class="label">总收入</div><div class="value">{{ fmt(totalRevenue) }}</div></div>
        <div class="card c-cost"><div class="label">总成本</div><div class="value">{{ fmt(totalCost) }}</div></div>
        <div class="card c-gross"><div class="label">毛利润</div><div class="value">{{ fmt(grossProfit) }}</div></div>
        <div class="card c-cashflow"><div class="label">现金流留存 ({{ md.cashFlowPct }}%)</div><div class="value">{{ fmt(cashFlowAmt) }}</div></div>
        <div class="card c-salary"><div class="label">人员薪资 ({{ salaryPct }}%)</div><div class="value">{{ fmt(salaryTotal) }}</div></div>
        <div class="card c-boss"><div class="label">老板分配池 ({{ md.bossPoolPct }}%)</div><div class="value">{{ fmt(bossPool) }}</div></div>
      </div>
      <div class="chart-row">
        <!-- Pie Chart -->
        <div class="pie-wrap">
          <h3>利润分配结构</h3>
          <div class="pie-box">
            <svg class="pie-svg" viewBox="0 0 100 100">
              <circle v-for="(seg,i) in pieSegments" :key="i" cx="50" cy="50" r="40"
                fill="none" :stroke="seg.color" stroke-width="20"
                :stroke-dasharray="seg.dash" :stroke-dashoffset="seg.offset"/>
            </svg>
            <div class="pie-center">
              <span class="big">{{ fmt(grossProfit) }}</span>
              <span class="small">毛利润</span>
            </div>
          </div>
          <div class="pie-legend">
            <span><span class="dot" style="background:var(--cyan)"></span>现金流 {{ md.cashFlowPct }}%</span>
            <span><span class="dot" style="background:var(--amber)"></span>薪资 {{ salaryPct }}%</span>
            <span><span class="dot" style="background:var(--purple)"></span>分配池 {{ md.bossPoolPct }}%</span>
          </div>
        </div>
        <!-- Waterfall -->
        <div class="waterfall">
          <h3>利润分配流程</h3>
          <div class="wf-row positive"><span class="wf-label">总收入</span><div class="wf-bar-wrap"><div class="wf-bar" :style="{width:barW(totalRevenue)}"></div></div><span class="wf-amount">{{ fmt(totalRevenue) }}</span></div>
          <div class="wf-row negative"><span class="wf-label">- 总成本</span><div class="wf-bar-wrap"><div class="wf-bar" :style="{width:barW(totalCost)}"></div></div><span class="wf-amount">{{ fmt(totalCost) }}</span></div>
          <div class="wf-divider"></div>
          <div class="wf-row result"><span class="wf-label">= 毛利润</span><div class="wf-bar-wrap"><div class="wf-bar" :style="{width:barW(grossProfit)}"></div></div><span class="wf-amount">{{ fmt(grossProfit) }}</span></div>
          <div class="wf-divider"></div>
          <div class="wf-row reserve"><span class="wf-label">现金流 ({{ md.cashFlowPct }}%)</span><div class="wf-bar-wrap"><div class="wf-bar" :style="{width:barW(cashFlowAmt)}"></div></div><span class="wf-amount">{{ fmt(cashFlowAmt) }}</span></div>
          <div class="wf-row person" v-for="m in md.members" :key="m.name"><span class="wf-label">{{ m.name }} ({{ m.pct }}%)</span><div class="wf-bar-wrap"><div class="wf-bar" :style="{width:barW(memberAmt(m))}"></div></div><span class="wf-amount">{{ fmt(memberAmt(m)) }}</span></div>
          <div class="wf-row boss" v-for="b in md.bonuses" :key="b.name"><span class="wf-label">{{ b.name }}</span><div class="wf-bar-wrap"><div class="wf-bar" :style="{width:barW(b.amount)}"></div></div><span class="wf-amount">{{ fmt(b.amount) }}</span></div>
          <div class="wf-divider"></div>
          <div class="wf-row boss"><span class="wf-label">= 待分配余额</span><div class="wf-bar-wrap"><div class="wf-bar" :style="{width:barW(poolRemaining)}"></div></div><span class="wf-amount">{{ fmt(poolRemaining) }}</span></div>
        </div>
      </div>
    </template>

    <!-- ===== Revenue ===== -->
    <template v-if="tab==='revenue'">
      <div class="page-header"><h2>{{ monthLabel }} - 收入记录</h2><button class="btn btn-primary" @click="openModal('revenue')">+ 添加收入</button></div>
      <div class="section-card">
        <table>
          <thead><tr><th style="width:110px">日期</th><th>描述</th><th style="width:110px">分类</th><th style="width:120px" class="text-right">金额</th><th style="width:100px">操作</th></tr></thead>
          <tbody>
            <tr v-for="r in md.revenues" :key="r.id">
              <td>{{ r.date }}</td><td>{{ r.desc }}</td><td>{{ r.category }}</td>
              <td class="text-right text-green">{{ fmt(r.amount) }}</td>
              <td><button class="btn btn-ghost btn-sm" @click="openModal('revenue',r)">编辑</button> <button class="btn btn-danger btn-sm" @click="confirmDel('revenue',r.id)">删除</button></td>
            </tr>
            <tr v-if="!md.revenues.length"><td colspan="5" class="empty-msg">暂无收入记录，点击右上角添加</td></tr>
          </tbody>
          <tfoot v-if="md.revenues.length"><tr><td colspan="3">合计</td><td class="text-right text-green">{{ fmt(totalRevenue) }}</td><td></td></tr></tfoot>
        </table>
      </div>
    </template>

    <!-- ===== Cost ===== -->
    <template v-if="tab==='cost'">
      <div class="page-header"><h2>{{ monthLabel }} - 成本记录</h2><button class="btn btn-primary" @click="openModal('cost')">+ 添加成本</button></div>
      <div class="section-card">
        <table>
          <thead><tr><th style="width:110px">日期</th><th>描述</th><th style="width:110px">分类</th><th style="width:120px" class="text-right">金额</th><th style="width:100px">操作</th></tr></thead>
          <tbody>
            <tr v-for="c in md.costs" :key="c.id">
              <td>{{ c.date }}</td><td>{{ c.desc }}</td><td>{{ c.category }}</td>
              <td class="text-right" :class="c.amount>=0?'text-red':'text-green'">{{ fmt(c.amount) }}</td>
              <td><button class="btn btn-ghost btn-sm" @click="openModal('cost',c)">编辑</button> <button class="btn btn-danger btn-sm" @click="confirmDel('cost',c.id)">删除</button></td>
            </tr>
            <tr v-if="!md.costs.length"><td colspan="5" class="empty-msg">暂无成本记录，点击右上角添加</td></tr>
          </tbody>
          <tfoot v-if="md.costs.length"><tr><td colspan="3">合计</td><td class="text-right text-red">{{ fmt(totalCost) }}</td><td></td></tr></tfoot>
        </table>
      </div>
    </template>

    <!-- ===== Distribution ===== -->
    <template v-if="tab==='dist'">
      <div class="page-header"><h2>{{ monthLabel }} - 利润分配</h2></div>

      <!-- 三大块概览 -->
      <div class="dist-grid">
        <div class="dist-card dc-cashflow">
          <div class="dc-label">现金流留存</div>
          <div class="dc-pct">{{ md.cashFlowPct }}%</div>
          <div class="dc-amount">{{ fmt(cashFlowAmt) }}</div>
        </div>
        <div class="dist-card dc-salary">
          <div class="dc-label">基本薪资</div>
          <div class="dc-pct">{{ salaryPct }}%</div>
          <div class="dc-amount">{{ fmt(salaryTotal) }}</div>
        </div>
        <div class="dist-card dc-pool">
          <div class="dc-label">老板分配池</div>
          <div class="dc-pct">{{ md.bossPoolPct }}%</div>
          <div class="dc-amount">{{ fmt(bossPool) }}</div>
        </div>
      </div>

      <!-- 分配明细表 -->
      <div class="dist-section">
        <h3>分配明细</h3>
        <table class="pb-table">
          <tbody>
            <tr class="highlight-green"><td class="pb-name">总收入</td><td class="pb-pct"></td><td class="pb-amt text-green">{{ fmt(totalRevenue) }}</td><td class="pb-note"></td></tr>
            <tr class="highlight-red"><td class="pb-name">- 总成本</td><td class="pb-pct"></td><td class="pb-amt text-red">{{ fmt(totalCost) }}</td><td class="pb-note"></td></tr>
            <tr class="sub-total"><td class="pb-name">= 毛利润</td><td class="pb-pct">100%</td><td class="pb-amt" style="color:var(--primary)">{{ fmt(grossProfit) }}</td><td class="pb-note"></td></tr>

            <tr class="cat-header"><td colspan="4">现金流留存</td></tr>
            <tr class="highlight-cyan"><td class="pb-name">公司现金流</td><td class="pb-pct">{{ md.cashFlowPct }}%</td><td class="pb-amt" style="color:var(--cyan)">{{ fmt(cashFlowAmt) }}</td><td class="pb-note">不动</td></tr>

            <tr class="cat-header"><td colspan="4">基本薪资 (按利润比例)</td></tr>
            <tr v-for="m in md.members" :key="'s'+m.name" class="highlight-amber">
              <td class="pb-name">{{ m.name }}</td>
              <td class="pb-pct">{{ m.pct }}%</td>
              <td class="pb-amt" style="color:var(--amber)">{{ fmt(memberAmt(m)) }}</td>
              <td class="pb-note">{{ m.role }}</td>
            </tr>
            <tr style="background:var(--amber-bg)"><td class="pb-name" style="font-weight:600">薪资小计</td><td class="pb-pct">{{ salaryPct }}%</td><td class="pb-amt" style="color:var(--amber);font-weight:700">{{ fmt(salaryTotal) }}</td><td></td></tr>

            <tr class="cat-header"><td colspan="4">老板分配池</td></tr>
            <tr v-for="b in md.bonuses" :key="'b'+b.name" class="highlight-purple">
              <td class="pb-name">{{ b.name }}</td>
              <td class="pb-pct">{{ b.pctLabel || '' }}</td>
              <td class="pb-amt" style="color:var(--purple)">{{ fmt(b.amount) }}</td>
              <td class="pb-note">{{ b.note || '' }}</td>
            </tr>
            <tr style="background:var(--purple-bg)"><td class="pb-name" style="font-weight:600">已分配</td><td class="pb-pct"></td><td class="pb-amt" style="color:var(--purple);font-weight:700">{{ fmt(poolUsed) }}</td><td></td></tr>
            <tr class="sub-total"><td class="pb-name">= 待分配余额</td><td class="pb-pct"></td><td class="pb-amt" style="color:var(--purple);font-size:20px">{{ fmt(poolRemaining) }}</td><td class="pb-note">老板决定</td></tr>
          </tbody>
        </table>
      </div>

      <!-- 比例调节 -->
      <div class="dist-section">
        <h3>分配比例调节</h3>
        <p style="font-size:13px;color:var(--gray-500);margin-bottom:12px">三项比例之和须为 100%，调整现金流或分配池后，薪资比例自动计算</p>
        <p v-if="salaryPct<0" class="ratio-warn">警告：薪资比例为负数，请调整现金流和分配池比例！</p>
        <div class="ratio-row rc">
          <label>现金流留存</label>
          <input type="range" min="0" :max="100-md.bossPoolPct" v-model.number="md.cashFlowPct" @input="save">
          <span class="ratio-val">{{ md.cashFlowPct }}%</span>
        </div>
        <div class="ratio-row rb">
          <label>老板分配池</label>
          <input type="range" min="0" :max="100-md.cashFlowPct" v-model.number="md.bossPoolPct" @input="save">
          <span class="ratio-val">{{ md.bossPoolPct }}%</span>
        </div>
        <div class="ratio-row rs">
          <label>基本薪资</label>
          <span style="flex:1;font-size:13px;color:var(--gray-500)">= 100% - 现金流 - 分配池（自动计算）</span>
          <span class="ratio-val">{{ salaryPct }}%</span>
        </div>
      </div>

      <!-- 分配池编辑 -->
      <div class="dist-section">
        <h3>老板分配池 - 编辑</h3>
        <p style="font-size:13px;color:var(--gray-500);margin-bottom:12px">分配池总额 {{ fmt(bossPool) }}，可添加奖金或其他劳务人员费用</p>
        <div v-for="(b,i) in md.bonuses" :key="i" class="bonus-row">
          <input class="bn" v-model="b.name" placeholder="姓名" @change="save">
          <input class="ba" type="number" v-model.number="b.amount" placeholder="金额" @change="save">
          <input class="bm" v-model="b.note" placeholder="备注" @change="save">
          <button class="btn btn-danger btn-sm" @click="removeBonus(i)">删除</button>
        </div>
        <button class="btn btn-ghost" @click="addBonus" style="margin-top:8px">+ 添加分配项</button>
      </div>
    </template>

  </main>

  <!-- Modal -->
  <div class="modal-mask" v-if="modal.show" @click.self="modal.show=false">
    <div class="modal">
      <div class="modal-head"><h3>{{ modal.editing ? '编辑' : '添加' }}{{ modal.type==='revenue'?'收入':'成本' }}</h3><button @click="modal.show=false">&times;</button></div>
      <div class="modal-body">
        <div class="form-row">
          <div class="form-group"><label>日期</label><input type="date" v-model="modal.form.date"></div>
          <div class="form-group"><label>分类</label>
            <select v-model="modal.form.category">
              <template v-if="modal.type==='revenue'">
                <option>项目收入</option><option>小红书</option><option>支付宝</option><option>其他收入</option>
              </template>
              <template v-else>
                <option>API成本</option><option>报销</option><option>租金</option><option>水电费</option><option>交通费</option><option>API退款</option><option>其他</option>
              </template>
            </select>
          </div>
        </div>
        <div class="form-row"><div class="form-group"><label>描述</label><input v-model="modal.form.desc" placeholder="输入描述"></div></div>
        <div class="form-row"><div class="form-group"><label>金额 (元)</label><input type="number" v-model.number="modal.form.amount" step="0.01" placeholder="0.00"></div></div>
      </div>
      <div class="modal-foot"><button class="btn btn-ghost" @click="modal.show=false">取消</button><button class="btn btn-primary" @click="saveEntry">确认保存</button></div>
    </div>
  </div>

  <!-- Confirm Delete -->
  <div class="modal-mask" v-if="delConfirm.show" @click.self="delConfirm.show=false">
    <div class="modal" style="width:360px">
      <div class="modal-head"><h3>确认删除</h3><button @click="delConfirm.show=false">&times;</button></div>
      <div class="modal-body"><p class="confirm-text">确定要删除这条记录吗？此操作无法撤销。</p></div>
      <div class="modal-foot"><button class="btn btn-ghost" @click="delConfirm.show=false">取消</button><button class="btn btn-danger" @click="doDelete">确认删除</button></div>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'accounting_app_data_v2';
const PIE_COLORS = ['#0891b2','#d97706','#7c3aed'];
const CIRC = 2 * Math.PI * 40; // SVG circle circumference

// 2026年3月预置数据
const MARCH_DATA = {
  revenues: [
    { id: 200001, date: '2026-03-25', desc: '小红书渠道收款', category: '小红书', amount: 12100 },
    { id: 200002, date: '2026-03-25', desc: '支付宝渠道收款（余额宝倒推）', category: '支付宝', amount: 16734.31 },
  ],
  costs: [
    { id: 100801, date: '2026-03-08', desc: 'API消耗', category: 'API成本', amount: 504.06 },
    { id: 100802, date: '2026-03-10', desc: 'API消耗', category: 'API成本', amount: 502.64 },
    { id: 100803, date: '2026-03-11', desc: 'API消耗', category: 'API成本', amount: 1005.64 },
    { id: 100804, date: '2026-03-14', desc: 'API消耗', category: 'API成本', amount: 502.89 },
    { id: 100805, date: '2026-03-15', desc: 'API消耗', category: 'API成本', amount: 985.77 },
    { id: 100806, date: '2026-03-16', desc: 'API消耗', category: 'API成本', amount: 502.83 },
    { id: 100807, date: '2026-03-17', desc: 'API消耗', category: 'API成本', amount: 879.83 },
    { id: 100808, date: '2026-03-19', desc: 'API消耗', category: 'API成本', amount: 502.38 },
    { id: 100809, date: '2026-03-20', desc: 'API消耗', category: 'API成本', amount: 489.85 },
    { id: 100810, date: '2026-03-21', desc: 'API消耗', category: 'API成本', amount: 634.86 },
    { id: 100811, date: '2026-03-22', desc: 'API消耗', category: 'API成本', amount: 503.67 },
    { id: 100812, date: '2026-03-23', desc: 'API消耗', category: 'API成本', amount: 947.88 },
    { id: 100813, date: '2026-03-25', desc: 'API消耗', category: 'API成本', amount: 467.90 },
    { id: 100901, date: '2026-03-25', desc: 'API消耗（补录）', category: 'API成本', amount: 1185.03 },
    { id: 100902, date: '2026-03-25', desc: 'API消耗（补录）', category: 'API成本', amount: 96.0 },
    { id: 100903, date: '2026-03-25', desc: 'API消耗（补录）', category: 'API成本', amount: 822.02 },
    { id: 100904, date: '2026-03-25', desc: 'API消耗（补录）', category: 'API成本', amount: 503.94 },
    { id: 100905, date: '2026-03-25', desc: 'API消耗（补录）', category: 'API成本', amount: 880 },
    { id: 100906, date: '2026-03-25', desc: 'API消耗（补录）', category: 'API成本', amount: 1475.77 },
    { id: 100907, date: '2026-03-25', desc: 'API退款', category: 'API退款', amount: -319.05 },
    { id: 100908, date: '2026-03-25', desc: 'API退款', category: 'API退款', amount: -99 },
    { id: 100909, date: '2026-03-25', desc: 'API退款', category: 'API退款', amount: -862 },
    { id: 100910, date: '2026-03-25', desc: 'API退款', category: 'API退款', amount: -10.45 },
    { id: 101001, date: '2026-03-25', desc: '报销', category: '报销', amount: 30 },
    { id: 101002, date: '2026-03-25', desc: '报销', category: '报销', amount: 211.2 },
    { id: 101003, date: '2026-03-25', desc: '报销', category: '报销', amount: 135 },
    { id: 101004, date: '2026-03-25', desc: '报销', category: '报销', amount: 265 },
  ],
  members: [
    { name: '欧', role: '老板', pct: 10 },
    { name: '曾', role: '技术工', pct: 10 },
    { name: '刘', role: '技术工', pct: 10 },
  ],
  bonuses: [
    { name: '李', amount: 804.53, pctLabel: '5%', note: '会计' },
    { name: '姚', amount: 200, pctLabel: '', note: '本月贡献' },
  ],
  cashFlowPct: 50,
  bossPoolPct: 20,
};

function newMonthData(month) {
  if (month === '2026-03') {
    return JSON.parse(JSON.stringify(MARCH_DATA));
  }
  return {
    revenues: [], costs: [],
    members: [
      { name: '欧', role: '老板', pct: 10 },
      { name: '曾', role: '技术工', pct: 10 },
      { name: '刘', role: '技术工', pct: 10 },
    ],
    bonuses: [
      { name: '李', amount: 0, pctLabel: '5%', note: '会计' },
    ],
    cashFlowPct: 50,
    bossPoolPct: 20,
  };
}

function loadAll() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; } }
function saveAll(d) { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }

const { createApp } = Vue;
createApp({
  data() {
    const now = new Date();
    const cm = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');
    return {
      tab: 'dashboard', currentMonth: cm, allData: loadAll(),
      modal: { show:false, type:'revenue', editing:null, form:{date:'',desc:'',category:'',amount:0} },
      delConfirm: { show:false, type:'', id:null },
    };
  },
  computed: {
    md() {
      if (!this.allData[this.currentMonth]) {
        const months = Object.keys(this.allData).sort();
        const prev = months.filter(m => m < this.currentMonth).pop();
        const d = newMonthData(this.currentMonth);
        if (prev && this.allData[prev] && this.currentMonth !== '2026-03') {
          d.members = JSON.parse(JSON.stringify(this.allData[prev].members));
          d.cashFlowPct = this.allData[prev].cashFlowPct;
          d.bossPoolPct = this.allData[prev].bossPoolPct;
        }
        this.allData[this.currentMonth] = d;
      }
      return this.allData[this.currentMonth];
    },
    monthLabel() { const [y,m]=this.currentMonth.split('-'); return y+'年'+parseInt(m)+'月'; },
    totalRevenue() { return this.md.revenues.reduce((s,r)=>s+(r.amount||0),0); },
    totalCost() { return this.md.costs.reduce((s,c)=>s+(c.amount||0),0); },
    grossProfit() { return this.totalRevenue - this.totalCost; },
    cashFlowAmt() { return this.grossProfit > 0 ? Math.round(this.grossProfit * this.md.cashFlowPct / 100 * 100)/100 : 0; },
    salaryTotal() { return this.grossProfit > 0 ? this.md.members.reduce((s,m)=>s+Math.round(this.grossProfit*m.pct/100*100)/100,0) : 0; },
    bossPool() { return this.grossProfit > 0 ? Math.round(this.grossProfit * this.md.bossPoolPct / 100 * 100)/100 : 0; },
    salaryPct() { return 100 - this.md.cashFlowPct - this.md.bossPoolPct; },
    poolUsed() { return this.md.bonuses.reduce((s,b)=>s+(b.amount||0),0); },
    poolRemaining() { return Math.round((this.bossPool - this.poolUsed)*100)/100; },
    maxBar() { return Math.max(this.totalRevenue, 1); },
    pieSegments() {
      if (this.grossProfit <= 0) return [];
      const pcts = [this.md.cashFlowPct, this.salaryPct, this.md.bossPoolPct];
      let offset = 0;
      return pcts.map((p,i)=>{ const d = CIRC*p/100; const o = -offset; offset += d; return {color:PIE_COLORS[i], dash:d+' '+CIRC, offset:o}; });
    },
  },
  methods: {
    fmt(n) { if(n==null||isNaN(n))return'¥0.00'; return'¥'+Number(n).toLocaleString('zh-CN',{minimumFractionDigits:2,maximumFractionDigits:2}); },
    barW(v) { return Math.max(0,Math.min(100,Math.abs(v)/this.maxBar*100))+'%'; },
    memberAmt(m) { return this.grossProfit>0?Math.round(this.grossProfit*m.pct/100*100)/100:0; },
    changeMonth(dir) { const[y,m]=this.currentMonth.split('-').map(Number); const d=new Date(y,m-1+dir,1); this.currentMonth=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); },
    save() { saveAll(this.allData); },
    addBonus() { this.md.bonuses.push({name:'',amount:0,pctLabel:'',note:''}); this.save(); },
    removeBonus(i) { this.md.bonuses.splice(i,1); this.save(); },
    openModal(type, item) {
      this.modal.type=type;
      if(item){this.modal.editing=item.id;this.modal.form={date:item.date,desc:item.desc,category:item.category,amount:item.amount};}
      else{this.modal.editing=null;const dc=type==='revenue'?'项目收入':'API成本';this.modal.form={date:this.currentMonth+'-01',desc:'',category:dc,amount:0};}
      this.modal.show=true;
    },
    saveEntry() {
      const f=this.modal.form;if(!f.date||!f.desc||f.amount===''||f.amount===null){alert('请填写完整信息');return;}
      const list=this.modal.type==='revenue'?this.md.revenues:this.md.costs;
      if(this.modal.editing){const idx=list.findIndex(x=>x.id===this.modal.editing);if(idx>=0)Object.assign(list[idx],{date:f.date,desc:f.desc,category:f.category,amount:Number(f.amount)});}
      else{list.push({id:Date.now(),date:f.date,desc:f.desc,category:f.category,amount:Number(f.amount)});}
      list.sort((a,b)=>a.date.localeCompare(b.date));this.save();this.modal.show=false;
    },
    confirmDel(type,id){this.delConfirm={show:true,type,id};},
    doDelete(){const list=this.delConfirm.type==='revenue'?this.md.revenues:this.md.costs;const idx=list.findIndex(x=>x.id===this.delConfirm.id);if(idx>=0)list.splice(idx,1);this.save();this.delConfirm.show=false;},
    exportJSON(){const b=new Blob([JSON.stringify(this.allData,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='记账数据_'+this.currentMonth+'.json';a.click();URL.revokeObjectURL(a.href);},
    importJSON(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=(ev)=>{try{this.allData=JSON.parse(ev.target.result);this.save();alert('导入成功！');}catch{alert('文件格式错误');}};r.readAsText(f);e.target.value='';},
    printPage(){window.print();},
  },
}).mount('#app');
</script>
</body>
</html>
