<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>记账管理系统</title>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#2563eb;--primary-light:#dbeafe;--primary-dark:#1d4ed8;
  --green:#16a34a;--green-bg:#dcfce7;
  --red:#dc2626;--red-bg:#fee2e2;
  --amber:#d97706;--amber-bg:#fef3c7;
  --cyan:#0891b2;--cyan-bg:#cffafe;
  --purple:#7c3aed;--purple-bg:#ede9fe;
  --gray-50:#f9fafb;--gray-100:#f3f4f6;--gray-200:#e5e7eb;--gray-300:#d1d5db;
  --gray-500:#6b7280;--gray-700:#374151;--gray-900:#111827;
  --sidebar-bg:#1e293b;--sidebar-text:#94a3b8;
  --radius:8px;--shadow:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);
  --shadow-lg:0 4px 12px rgba(0,0,0,.1);
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:var(--gray-100);color:var(--gray-900);line-height:1.6}
.app{display:flex;min-height:100vh}

/* Sidebar */
.sidebar{width:220px;background:var(--sidebar-bg);color:var(--sidebar-text);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:10}
.sidebar-logo{padding:20px;font-size:18px;font-weight:700;color:#fff;border-bottom:1px solid rgba(255,255,255,.1);text-align:center;letter-spacing:2px}
.month-nav{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:4px}
.month-nav button{background:rgba(255,255,255,.1);border:none;color:#fff;width:28px;height:28px;border-radius:4px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.month-nav button:hover{background:rgba(255,255,255,.2)}
.month-nav input[type=month]{flex:1;background:transparent;border:1px solid rgba(255,255,255,.2);color:#fff;padding:4px 6px;border-radius:4px;font-size:13px;text-align:center}
.month-nav input[type=month]::-webkit-calendar-picker-indicator{filter:invert(1);cursor:pointer}
.nav-links{flex:1;padding:8px 0}
.nav-links a{display:flex;align-items:center;padding:10px 20px;color:var(--sidebar-text);text-decoration:none;cursor:pointer;transition:all .2s;font-size:14px;border-left:3px solid transparent}
.nav-links a:hover{background:rgba(255,255,255,.05);color:#fff}
.nav-links a.active{background:rgba(37,99,235,.2);color:#fff;border-left-color:var(--primary)}
.nav-links a .icon{width:20px;margin-right:10px;text-align:center;font-size:15px}
.sidebar-footer{padding:12px 16px;border-top:1px solid rgba(255,255,255,.1);display:flex;flex-direction:column;gap:6px}
.sidebar-footer button{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:var(--sidebar-text);padding:6px 12px;border-radius:4px;cursor:pointer;font-size:12px;transition:all .2s}
.sidebar-footer button:hover{background:rgba(255,255,255,.15);color:#fff}

/* Main */
.main{flex:1;margin-left:220px;padding:24px 32px}
.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.page-header h2{font-size:20px;font-weight:600}

/* Cards */
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:28px}
.card{background:#fff;border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);border-left:4px solid var(--gray-300)}
.card .label{font-size:13px;color:var(--gray-500);margin-bottom:6px}
.card .value{font-size:24px;font-weight:700}
.card.c-revenue{border-left-color:var(--green)}.card.c-revenue .value{color:var(--green)}
.card.c-cost{border-left-color:var(--red)}.card.c-cost .value{color:var(--red)}
.card.c-gross{border-left-color:var(--primary)}.card.c-gross .value{color:var(--primary)}
.card.c-payroll{border-left-color:var(--amber)}.card.c-payroll .value{color:var(--amber)}
.card.c-reserve{border-left-color:var(--cyan)}.card.c-reserve .value{color:var(--cyan)}
.card.c-boss{border-left-color:var(--purple)}.card.c-boss .value{color:var(--purple)}

/* Waterfall */
.waterfall{background:#fff;border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);margin-bottom:28px}
.waterfall h3{font-size:16px;margin-bottom:16px;color:var(--gray-700)}
.wf-row{display:flex;align-items:center;margin-bottom:10px;font-size:14px}
.wf-label{width:120px;color:var(--gray-700);font-weight:500}
.wf-bar-wrap{flex:1;height:28px;background:var(--gray-100);border-radius:4px;overflow:hidden;margin:0 12px;position:relative}
.wf-bar{height:100%;border-radius:4px;transition:width .5s ease;min-width:2px}
.wf-amount{width:120px;text-align:right;font-weight:600;font-variant-numeric:tabular-nums}
.wf-row.positive .wf-bar{background:var(--green)}.wf-row.positive .wf-amount{color:var(--green)}
.wf-row.negative .wf-bar{background:var(--red)}.wf-row.negative .wf-amount{color:var(--red)}
.wf-row.result .wf-bar{background:var(--primary)}.wf-row.result .wf-amount{color:var(--primary)}
.wf-row.boss .wf-bar{background:var(--purple)}.wf-row.boss .wf-amount{color:var(--purple)}
.wf-row.reserve .wf-bar{background:var(--cyan)}.wf-row.reserve .wf-amount{color:var(--cyan)}
.wf-divider{border-top:1px dashed var(--gray-300);margin:8px 0}

/* Table */
.section-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:24px}
.section-card .header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--gray-200)}
.section-card .header h3{font-size:16px;font-weight:600}
table{width:100%;border-collapse:collapse}
thead{background:var(--gray-50)}
th{padding:10px 16px;text-align:left;font-size:13px;font-weight:600;color:var(--gray-500);text-transform:uppercase;border-bottom:2px solid var(--gray-200)}
td{padding:10px 16px;border-bottom:1px solid var(--gray-100);font-size:14px}
tbody tr:hover{background:var(--gray-50)}
tfoot td{border-top:2px solid var(--gray-200);font-weight:600;background:var(--gray-50)}
.text-right{text-align:right}
.text-green{color:var(--green)}
.text-red{color:var(--red)}
.text-muted{color:var(--gray-500)}
.empty-msg{padding:40px;text-align:center;color:var(--gray-500);font-size:14px}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:4px;padding:7px 14px;border:none;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-dark)}
.btn-success{background:var(--green);color:#fff}.btn-success:hover{opacity:.9}
.btn-danger{background:var(--red);color:#fff}.btn-danger:hover{opacity:.9}
.btn-ghost{background:transparent;color:var(--gray-500);border:1px solid var(--gray-300)}.btn-ghost:hover{background:var(--gray-100);color:var(--gray-700)}
.btn-sm{padding:4px 10px;font-size:12px}

/* Form */
.form-row{display:flex;gap:12px;margin-bottom:14px;align-items:flex-end}
.form-group{display:flex;flex-direction:column;flex:1}
.form-group label{font-size:12px;color:var(--gray-500);margin-bottom:4px;font-weight:500}
.form-group input,.form-group select,.form-group textarea{padding:8px 10px;border:1px solid var(--gray-300);border-radius:6px;font-size:14px;outline:none;transition:border .2s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-light)}
.form-group.w-auto{flex:none}

/* Payroll */
.payroll-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;padding:20px}
.payroll-card{border:1px solid var(--gray-200);border-radius:var(--radius);padding:16px;transition:box-shadow .2s}
.payroll-card:hover{box-shadow:var(--shadow)}
.payroll-card .name{font-size:16px;font-weight:600;margin-bottom:2px}
.payroll-card .role{font-size:12px;color:var(--gray-500);margin-bottom:12px}
.payroll-card .salary-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.payroll-card .salary-row label{font-size:13px;color:var(--gray-700);width:50px}
.payroll-card .salary-row input{flex:1;padding:6px 8px;border:1px solid var(--gray-300);border-radius:4px;font-size:14px;outline:none}
.payroll-card .salary-row input:focus{border-color:var(--primary)}
.payroll-card .net{margin-top:8px;padding-top:8px;border-top:1px solid var(--gray-200);font-size:15px;font-weight:600;color:var(--primary);text-align:right}

/* Profit distribution */
.profit-section{background:#fff;border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);margin-bottom:24px}
.profit-section h3{margin-bottom:16px;font-size:16px}
.cashflow-slider{display:flex;align-items:center;gap:12px;margin-bottom:20px;padding:16px;background:var(--cyan-bg);border-radius:var(--radius)}
.cashflow-slider label{font-size:14px;color:var(--gray-700);font-weight:500}
.cashflow-slider input[type=range]{flex:1;accent-color:var(--cyan)}
.cashflow-slider .pct{font-size:18px;font-weight:700;color:var(--cyan);min-width:50px;text-align:center}
.profit-breakdown{display:flex;flex-direction:column;gap:12px}
.pb-row{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-radius:6px;font-size:15px}
.pb-row .pb-label{font-weight:500}
.pb-row .pb-value{font-weight:700;font-size:18px;font-variant-numeric:tabular-nums}
.pb-row.income{background:var(--green-bg)}.pb-row.income .pb-value{color:var(--green)}
.pb-row.expense{background:var(--red-bg)}.pb-row.expense .pb-value{color:var(--red)}
.pb-row.subtotal{background:var(--primary-light)}.pb-row.subtotal .pb-value{color:var(--primary)}
.pb-row.cashflow{background:var(--cyan-bg)}.pb-row.cashflow .pb-value{color:var(--cyan)}
.pb-row.boss-income{background:var(--purple-bg)}.pb-row.boss-income .pb-value{color:var(--purple)}
.pb-row.warning{background:var(--amber-bg)}.pb-row.warning .pb-value{color:var(--amber)}
.pb-arrow{text-align:center;color:var(--gray-300);font-size:18px}

/* Modal */
.modal-mask{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:#fff;border-radius:12px;width:460px;max-width:92vw;box-shadow:var(--shadow-lg)}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--gray-200)}
.modal-head h3{font-size:16px;font-weight:600}
.modal-head button{background:none;border:none;font-size:22px;cursor:pointer;color:var(--gray-500);line-height:1}
.modal-body{padding:20px}
.modal-foot{display:flex;justify-content:flex-end;gap:8px;padding:12px 20px;border-top:1px solid var(--gray-200)}

/* Confirm */
.confirm-text{font-size:15px;color:var(--gray-700);margin-bottom:8px}

/* Print */
@media print{
  .sidebar,.btn,.month-nav,.sidebar-footer,.modal-mask{display:none!important}
  .main{margin-left:0!important;padding:10px!important}
  .card,.section-card,.waterfall,.profit-section{box-shadow:none!important;break-inside:avoid}
}
@media(max-width:768px){
  .sidebar{width:60px}.sidebar-logo span,.nav-links a span,.sidebar-footer span{display:none}
  .nav-links a .icon{margin:0}
  .main{margin-left:60px;padding:16px}
  .cards{grid-template-columns:1fr 1fr}
  .payroll-grid{grid-template-columns:1fr}
  .form-row{flex-direction:column}
}
</style>
</head>
<body>
<div id="app" class="app">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">记账管理系统</div>
    <div class="month-nav">
      <button @click="changeMonth(-1)" title="上个月">&lsaquo;</button>
      <input type="month" v-model="currentMonth">
      <button @click="changeMonth(1)" title="下个月">&rsaquo;</button>
    </div>
    <nav class="nav-links">
      <a :class="{active:tab==='dashboard'}" @click="tab='dashboard'"><span class="icon">&#9632;</span><span>总 览</span></a>
      <a :class="{active:tab==='revenue'}" @click="tab='revenue'"><span class="icon">&#9650;</span><span>收 入</span></a>
      <a :class="{active:tab==='cost'}" @click="tab='cost'"><span class="icon">&#9660;</span><span>成 本</span></a>
      <a :class="{active:tab==='payroll'}" @click="tab='payroll'"><span class="icon">&#9679;</span><span>工 资</span></a>
      <a :class="{active:tab==='profit'}" @click="tab='profit'"><span class="icon">&#9733;</span><span>利润分配</span></a>
    </nav>
    <div class="sidebar-footer">
      <button @click="printPage"><span>打印月报</span></button>
      <button @click="exportJSON"><span>导出数据</span></button>
      <button @click="$refs.importFile.click()"><span>导入数据</span></button>
      <input type="file" ref="importFile" accept=".json" @change="importJSON" style="display:none">
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main">

    <!-- ===== Dashboard ===== -->
    <template v-if="tab==='dashboard'">
      <div class="page-header"><h2>{{ monthLabel }} - 总览</h2></div>
      <div class="cards">
        <div class="card c-revenue"><div class="label">总收入</div><div class="value">{{ fmt(totalRevenue) }}</div></div>
        <div class="card c-cost"><div class="label">总成本</div><div class="value">{{ fmt(totalCost) }}</div></div>
        <div class="card c-gross"><div class="label">毛利润</div><div class="value">{{ fmt(grossProfit) }}</div></div>
        <div class="card c-payroll"><div class="label">工资支出</div><div class="value">{{ fmt(totalPayroll) }}</div></div>
        <div class="card c-reserve"><div class="label">现金流留存 ({{ md.cashFlowPct }}%)</div><div class="value">{{ fmt(cashFlowReserve) }}</div></div>
        <div class="card c-boss"><div class="label">老板所得</div><div class="value">{{ fmt(bossIncome) }}</div></div>
      </div>
      <div class="waterfall">
        <h3>利润分配流程</h3>
        <div class="wf-row positive"><span class="wf-label">总收入</span><div class="wf-bar-wrap"><div class="wf-bar" :style="{width:barW(totalRevenue)}"></div></div><span class="wf-amount">{{ fmt(totalRevenue) }}</span></div>
        <div class="wf-row negative"><span class="wf-label">- 总成本</span><div class="wf-bar-wrap"><div class="wf-bar" :style="{width:barW(totalCost)}"></div></div><span class="wf-amount">{{ fmt(totalCost) }}</span></div>
        <div class="wf-divider"></div>
        <div class="wf-row result"><span class="wf-label">= 毛利润</span><div class="wf-bar-wrap"><div class="wf-bar" :style="{width:barW(grossProfit)}"></div></div><span class="wf-amount">{{ fmt(grossProfit) }}</span></div>
        <div class="wf-row negative"><span class="wf-label">- 工资</span><div class="wf-bar-wrap"><div class="wf-bar" :style="{width:barW(totalPayroll)}"></div></div><span class="wf-amount">{{ fmt(totalPayroll) }}</span></div>
        <div class="wf-divider"></div>
        <div class="wf-row result"><span class="wf-label">= 可分配利润</span><div class="wf-bar-wrap"><div class="wf-bar" :style="{width:barW(distributable)}"></div></div><span class="wf-amount">{{ fmt(distributable) }}</span></div>
        <div class="wf-row reserve"><span class="wf-label">- 现金流留存</span><div class="wf-bar-wrap"><div class="wf-bar" :style="{width:barW(cashFlowReserve)}"></div></div><span class="wf-amount">{{ fmt(cashFlowReserve) }}</span></div>
        <div class="wf-divider"></div>
        <div class="wf-row boss"><span class="wf-label">= 老板所得</span><div class="wf-bar-wrap"><div class="wf-bar" :style="{width:barW(bossIncome)}"></div></div><span class="wf-amount">{{ fmt(bossIncome) }}</span></div>
      </div>
    </template>

    <!-- ===== Revenue ===== -->
    <template v-if="tab==='revenue'">
      <div class="page-header"><h2>{{ monthLabel }} - 收入记录</h2><button class="btn btn-primary" @click="openModal('revenue')">+ 添加收入</button></div>
      <div class="section-card">
        <table>
          <thead><tr><th style="width:110px">日期</th><th>描述</th><th style="width:110px">分类</th><th style="width:120px" class="text-right">金额</th><th style="width:100px">操作</th></tr></thead>
          <tbody>
            <tr v-for="r in md.revenues" :key="r.id">
              <td>{{ r.date }}</td><td>{{ r.desc }}</td><td>{{ r.category }}</td>
              <td class="text-right text-green">{{ fmt(r.amount) }}</td>
              <td><button class="btn btn-ghost btn-sm" @click="openModal('revenue',r)">编辑</button> <button class="btn btn-danger btn-sm" @click="confirmDel('revenue',r.id)">删除</button></td>
            </tr>
            <tr v-if="!md.revenues.length"><td colspan="5" class="empty-msg">暂无收入记录，点击右上角添加</td></tr>
          </tbody>
          <tfoot v-if="md.revenues.length"><tr><td colspan="3">合计</td><td class="text-right text-green">{{ fmt(totalRevenue) }}</td><td></td></tr></tfoot>
        </table>
      </div>
    </template>

    <!-- ===== Cost ===== -->
    <template v-if="tab==='cost'">
      <div class="page-header"><h2>{{ monthLabel }} - 成本记录</h2><button class="btn btn-primary" @click="openModal('cost')">+ 添加成本</button></div>
      <div class="section-card">
        <table>
          <thead><tr><th style="width:110px">日期</th><th>描述</th><th style="width:110px">分类</th><th style="width:120px" class="text-right">金额</th><th style="width:100px">操作</th></tr></thead>
          <tbody>
            <tr v-for="c in md.costs" :key="c.id">
              <td>{{ c.date }}</td><td>{{ c.desc }}</td><td>{{ c.category }}</td>
              <td class="text-right text-red">{{ fmt(c.amount) }}</td>
              <td><button class="btn btn-ghost btn-sm" @click="openModal('cost',c)">编辑</button> <button class="btn btn-danger btn-sm" @click="confirmDel('cost',c.id)">删除</button></td>
            </tr>
            <tr v-if="!md.costs.length"><td colspan="5" class="empty-msg">暂无成本记录，点击右上角添加</td></tr>
          </tbody>
          <tfoot v-if="md.costs.length"><tr><td colspan="3">合计</td><td class="text-right text-red">{{ fmt(totalCost) }}</td><td></td></tr></tfoot>
        </table>
      </div>
    </template>

    <!-- ===== Payroll ===== -->
    <template v-if="tab==='payroll'">
      <div class="page-header"><h2>{{ monthLabel }} - 工资管理</h2></div>
      <div class="section-card">
        <div class="payroll-grid">
          <div class="payroll-card" v-for="e in md.payroll" :key="e.id">
            <div class="salary-row"><label>姓名</label><input v-model="e.name" @change="save" placeholder="姓名"></div>
            <div class="role">{{ e.role }}</div>
            <div class="salary-row"><label>底薪</label><input type="number" v-model.number="e.salary" @change="save" min="0"></div>
            <div class="salary-row"><label>奖金</label><input type="number" v-model.number="e.bonus" @change="save" min="0"></div>
            <div class="salary-row"><label>扣除</label><input type="number" v-model.number="e.deduction" @change="save" min="0"></div>
            <div class="net">实发: {{ fmt(e.salary + e.bonus - e.deduction) }}</div>
          </div>
        </div>
        <table>
          <tfoot><tr><td colspan="3" style="padding:12px 20px;font-weight:600">工资合计</td><td class="text-right" style="padding:12px 20px;font-weight:700;color:var(--amber)">{{ fmt(totalPayroll) }}</td></tr></tfoot>
        </table>
      </div>
    </template>

    <!-- ===== Profit Distribution ===== -->
    <template v-if="tab==='profit'">
      <div class="page-header"><h2>{{ monthLabel }} - 利润分配</h2></div>
      <div class="profit-section">
        <h3>现金流留存比例</h3>
        <div class="cashflow-slider">
          <label>留存比例</label>
          <input type="range" min="0" max="100" v-model.number="md.cashFlowPct" @change="save">
          <span class="pct">{{ md.cashFlowPct }}%</span>
        </div>
        <h3>分配明细</h3>
        <div class="profit-breakdown">
          <div class="pb-row income"><span class="pb-label">总收入</span><span class="pb-value">{{ fmt(totalRevenue) }}</span></div>
          <div class="pb-arrow">-</div>
          <div class="pb-row expense"><span class="pb-label">总成本</span><span class="pb-value">{{ fmt(totalCost) }}</span></div>
          <div class="pb-arrow">=</div>
          <div class="pb-row subtotal"><span class="pb-label">毛利润</span><span class="pb-value">{{ fmt(grossProfit) }}</span></div>
          <div class="pb-arrow">-</div>
          <div class="pb-row expense"><span class="pb-label">工资支出</span><span class="pb-value">{{ fmt(totalPayroll) }}</span></div>
          <div class="pb-arrow">=</div>
          <div :class="['pb-row', distributable>=0?'subtotal':'warning']"><span class="pb-label">可分配利润</span><span class="pb-value">{{ fmt(distributable) }}</span></div>
          <div class="pb-arrow">-</div>
          <div class="pb-row cashflow"><span class="pb-label">现金流留存 ({{ md.cashFlowPct }}%)</span><span class="pb-value">{{ fmt(cashFlowReserve) }}</span></div>
          <div class="pb-arrow">=</div>
          <div :class="['pb-row','boss-income']"><span class="pb-label">老板所得</span><span class="pb-value">{{ fmt(bossIncome) }}</span></div>
        </div>
      </div>
    </template>

  </main>

  <!-- Modal -->
  <div class="modal-mask" v-if="modal.show" @click.self="modal.show=false">
    <div class="modal">
      <div class="modal-head"><h3>{{ modal.editing ? '编辑' : '添加' }}{{ modal.type==='revenue'?'收入':'成本' }}</h3><button @click="modal.show=false">&times;</button></div>
      <div class="modal-body">
        <div class="form-row">
          <div class="form-group"><label>日期</label><input type="date" v-model="modal.form.date"></div>
          <div class="form-group"><label>分类</label>
            <select v-model="modal.form.category">
              <template v-if="modal.type==='revenue'">
                <option>项目收入</option><option>服务收入</option><option>其他收入</option>
              </template>
              <template v-else>
                <option>材料成本</option><option>租金</option><option>水电费</option><option>交通费</option><option>办公用品</option><option>其他</option>
              </template>
            </select>
          </div>
        </div>
        <div class="form-row"><div class="form-group"><label>描述</label><input v-model="modal.form.desc" placeholder="输入描述"></div></div>
        <div class="form-row"><div class="form-group"><label>金额 (元)</label><input type="number" v-model.number="modal.form.amount" min="0" step="0.01" placeholder="0.00"></div></div>
      </div>
      <div class="modal-foot"><button class="btn btn-ghost" @click="modal.show=false">取消</button><button class="btn btn-primary" @click="saveEntry">确认保存</button></div>
    </div>
  </div>

  <!-- Confirm Delete -->
  <div class="modal-mask" v-if="delConfirm.show" @click.self="delConfirm.show=false">
    <div class="modal" style="width:360px">
      <div class="modal-head"><h3>确认删除</h3><button @click="delConfirm.show=false">&times;</button></div>
      <div class="modal-body"><p class="confirm-text">确定要删除这条记录吗？此操作无法撤销。</p></div>
      <div class="modal-foot"><button class="btn btn-ghost" @click="delConfirm.show=false">取消</button><button class="btn btn-danger" @click="doDelete">确认删除</button></div>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'accounting_app_data';

// 2026年3月预置成本数据
const MARCH_2026_COSTS = [
  { id: 100801, date: '2026-03-08', desc: '日常支出', category: '材料成本', amount: 504.06 },
  { id: 100802, date: '2026-03-10', desc: '日常支出', category: '材料成本', amount: 502.64 },
  { id: 100803, date: '2026-03-11', desc: '日常支出', category: '材料成本', amount: 1005.64 },
  { id: 100804, date: '2026-03-14', desc: '日常支出', category: '材料成本', amount: 502.89 },
  { id: 100805, date: '2026-03-15', desc: '日常支出', category: '材料成本', amount: 985.77 },
  { id: 100806, date: '2026-03-16', desc: '日常支出', category: '材料成本', amount: 502.83 },
  { id: 100807, date: '2026-03-17', desc: '日常支出', category: '材料成本', amount: 879.83 },
  { id: 100808, date: '2026-03-19', desc: '日常支出', category: '材料成本', amount: 502.38 },
  { id: 100809, date: '2026-03-20', desc: '日常支出', category: '材料成本', amount: 489.85 },
  { id: 100810, date: '2026-03-21', desc: '日常支出', category: '材料成本', amount: 634.86 },
  { id: 100811, date: '2026-03-22', desc: '日常支出', category: '材料成本', amount: 503.67 },
  { id: 100812, date: '2026-03-23', desc: '日常支出', category: '材料成本', amount: 947.88 },
  { id: 100813, date: '2026-03-25', desc: '日常支出', category: '材料成本', amount: 467.90 },
];

function newMonthData(month) {
  const today = month + '-01';
  const data = {
    revenues: [],
    costs: [],
    payroll: [
      { id: 1, name: '会计',   role: '会计',  salary: 0, bonus: 0, deduction: 0 },
      { id: 2, name: '老板',   role: '老板',  salary: 0, bonus: 0, deduction: 0 },
      { id: 3, name: '技术工A', role: '技术工', salary: 0, bonus: 0, deduction: 0 },
      { id: 4, name: '技术工B', role: '技术工', salary: 0, bonus: 0, deduction: 0 },
    ],
    cashFlowPct: 20,
  };
  // 预填3月数据
  if (month === '2026-03') {
    data.costs = JSON.parse(JSON.stringify(MARCH_2026_COSTS));
  }
  return data;
}

function loadAll() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
}
function saveAll(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

const { createApp } = Vue;
createApp({
  data() {
    const now = new Date();
    const cm = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');
    const all = loadAll();
    return {
      tab: 'dashboard',
      currentMonth: cm,
      allData: all,
      modal: { show: false, type: 'revenue', editing: null, form: { date:'', desc:'', category:'', amount:0 } },
      delConfirm: { show: false, type:'', id: null },
    };
  },
  computed: {
    md() {
      if (!this.allData[this.currentMonth]) {
        // try to carry over payroll from most recent previous month
        const months = Object.keys(this.allData).sort();
        const prev = months.filter(m => m < this.currentMonth).pop();
        const d = newMonthData(this.currentMonth);
        if (prev && this.allData[prev]) {
          d.payroll = JSON.parse(JSON.stringify(this.allData[prev].payroll));
          d.cashFlowPct = this.allData[prev].cashFlowPct;
        }
        this.allData[this.currentMonth] = d;
      }
      return this.allData[this.currentMonth];
    },
    monthLabel() {
      const [y,m] = this.currentMonth.split('-');
      return y + '年' + parseInt(m) + '月';
    },
    totalRevenue() { return this.md.revenues.reduce((s,r) => s + (r.amount||0), 0); },
    totalCost() { return this.md.costs.reduce((s,c) => s + (c.amount||0), 0); },
    grossProfit() { return this.totalRevenue - this.totalCost; },
    totalPayroll() { return this.md.payroll.reduce((s,e) => s + (e.salary||0) + (e.bonus||0) - (e.deduction||0), 0); },
    distributable() { return this.grossProfit - this.totalPayroll; },
    cashFlowReserve() { return this.distributable > 0 ? Math.round(this.distributable * this.md.cashFlowPct / 100 * 100) / 100 : 0; },
    bossIncome() { return this.distributable > 0 ? this.distributable - this.cashFlowReserve : this.distributable; },
    maxBar() { return Math.max(this.totalRevenue, 1); },
  },
  methods: {
    fmt(n) {
      if (n == null || isNaN(n)) return '¥0.00';
      return '¥' + Number(n).toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    },
    barW(v) {
      const pct = Math.max(0, Math.min(100, Math.abs(v) / this.maxBar * 100));
      return pct + '%';
    },
    changeMonth(dir) {
      const [y,m] = this.currentMonth.split('-').map(Number);
      const d = new Date(y, m - 1 + dir, 1);
      this.currentMonth = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
    },
    save() { saveAll(this.allData); },
    openModal(type, item) {
      this.modal.type = type;
      if (item) {
        this.modal.editing = item.id;
        this.modal.form = { date: item.date, desc: item.desc, category: item.category, amount: item.amount };
      } else {
        this.modal.editing = null;
        const defCat = type === 'revenue' ? '项目收入' : '材料成本';
        this.modal.form = { date: this.currentMonth + '-01', desc: '', category: defCat, amount: 0 };
      }
      this.modal.show = true;
    },
    saveEntry() {
      const f = this.modal.form;
      if (!f.date || !f.desc || !f.amount) { alert('请填写完整信息'); return; }
      const list = this.modal.type === 'revenue' ? this.md.revenues : this.md.costs;
      if (this.modal.editing) {
        const idx = list.findIndex(x => x.id === this.modal.editing);
        if (idx >= 0) { Object.assign(list[idx], { date:f.date, desc:f.desc, category:f.category, amount:Number(f.amount) }); }
      } else {
        list.push({ id: Date.now(), date: f.date, desc: f.desc, category: f.category, amount: Number(f.amount) });
      }
      list.sort((a,b) => a.date.localeCompare(b.date));
      this.save();
      this.modal.show = false;
    },
    confirmDel(type, id) {
      this.delConfirm = { show: true, type, id };
    },
    doDelete() {
      const list = this.delConfirm.type === 'revenue' ? this.md.revenues : this.md.costs;
      const idx = list.findIndex(x => x.id === this.delConfirm.id);
      if (idx >= 0) list.splice(idx, 1);
      this.save();
      this.delConfirm.show = false;
    },
    exportJSON() {
      const blob = new Blob([JSON.stringify(this.allData, null, 2)], { type:'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = '记账数据_' + this.currentMonth + '.json';
      a.click();
      URL.revokeObjectURL(a.href);
    },
    importJSON(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const data = JSON.parse(ev.target.result);
          this.allData = data;
          this.save();
          alert('导入成功！');
        } catch { alert('文件格式错误'); }
      };
      reader.readAsText(file);
      e.target.value = '';
    },
    printPage() { window.print(); },
  },
  watch: {
    currentMonth() { /* md computed will auto-init */ }
  },
}).mount('#app');
</script>
</body>
</html>
